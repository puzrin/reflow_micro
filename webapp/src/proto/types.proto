syntax = "proto3";

import "nanopb.proto";
import "google/protobuf/descriptor.proto";

extend google.protobuf.FieldOptions {
  optional string reflow_export_name = 50003;
}

// Proto-side base constants only.
// Final shared constants are produced by merging this enum with exported
// field-limit options below.
enum ConstantsBase {
  option (nanopb_enumopt).long_names = false;

  CONSTANT_UNSPECIFIED = 0;
  MAX_BLE_NAME_LENGTH = 29;
  MAX_TOUCH_SAFE_TEMPERATURE = 40;
  // Initial temperature for all profiles
  START_TEMPERATURE = 30;
  // History IDs for tasks (selected to not conflict with profile IDs)
  HISTORY_ID_SENSOR_BAKE_MODE = 4000;
  HISTORY_ID_ADRC_TEST_MODE = 4001;
  HISTORY_ID_STEP_RESPONSE = 4002;
  MAX_RPC_MESSAGE_SIZE = 4096;
  MAX_AUTH_RPC_MESSAGE_SIZE = 1024;
}

message Segment {
  // Target temperature in Celsius
  int32 target = 1;
  // Duration in seconds
  int32 duration = 2;
}

message Profile {
  // Unique profile identifier
  int32 id = 1;
  // Profile name
  string name = 2 [
    (nanopb).max_length = 50,
    (reflow_export_name) = "MAX_PROFILE_NAME_LENGTH"
  ];
  // Temperature segments sequence
  repeated Segment segments = 3 [
    (nanopb).max_count = 10,
    (reflow_export_name) = "MAX_REFLOW_SEGMENTS"
  ];
}

message ProfilesData {
  // Available profiles
  repeated Profile items = 1 [
    (nanopb).max_count = 10,
    (reflow_export_name) = "MAX_REFLOW_PROFILES"
  ];
  // Currently selected profile id
  int32 selected_id = 2;
}

message Point {
  float x = 1;
  float y = 2;
}

message HistoryChunk {
  int32 type = 1;
  int32 version = 2;
  repeated Point data = 3 [
    (nanopb).max_count = 100,
    (reflow_export_name) = "MAX_HISTORY_CHUNK"
  ];
}

message HeadParams {
  //
  // Temperature sensor calibration data
  //
  float sensor_p0_at = 1;
  float sensor_p0_value = 2;
  float sensor_p1_at = 3;
  float sensor_p1_value = 4;

  //
  // ADRC calibration data
  //

  // System response time (when temperature reaches 63% of final value)
  float adrc_response = 5;
  // Scale. Max derivative / power
  float adrc_b0 = 6;
  // ω_observer = N / τ. Usually 3..10
  // 5 is a good starting point. Increase it until it oscillates, then back off by 10-20%.
  float adrc_n_coeff = 7;
  // ω_controller = ω_observer / M. Usually 2..5
  // 3 is a good starting point. Changes are probably not required.
  float adrc_m_coeff = 8;
}

enum SensorType {
  RTD = 0; // Standalone PT100
  TCR = 1; // Indirect measurement via heater's TCR (copper: 0.39%/°C, tungsten: 0.45%/°C)
}

enum HeadStatus {
  HEAD_DISCONNECTED = 0;
  HEAD_INITIALIZING = 1;
  HEAD_CONNECTED = 2;
  HEAD_ERROR = 3;
}

enum PowerStatus {
  PWR_OFF = 0;
  PWR_INITIALIZING = 1;
  PWR_TRANSITION = 2; // PD contract change
  PWR_OK = 3;
  PWR_FAILURE = 4;
}

enum DeviceHealthStatus {
  DEV_NOT_READY = 0;
  DEV_OK = 1;
  DEV_FAILURE = 2;
}

enum DeviceActivityStatus {
  IDLE = 0;
  REFLOW = 1;
  SENSOR_BAKE = 2;
  ADRC_TEST = 3;
  STEP_RESPONSE = 4;
  BONDING = 5;
}

message DeviceInfo {
  // Main
  DeviceHealthStatus health = 1;
  DeviceActivityStatus activity = 2;
  PowerStatus power = 3;
  HeadStatus head = 4;
  int32 temperature_x10 = 5;
  // Debug info
  uint32 peak_mv = 6;
  uint32 peak_ma = 7;
  uint32 duty_x1000 = 8; // PWM duty cycle [0..1000]
  uint32 resistance_mohms = 9;
  // Max possible power in mW, for current heater resistance
  // at current PD profile
  uint32 max_mw = 10;
}
